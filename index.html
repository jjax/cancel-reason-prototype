<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tsuklio – Cancel Subscription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand: #B85C1A;
  --brand-hover: #9A4C14;
  --brand-light: #FDF3EB;
  --brand-mid: #E8873A;
  --brand-dark: #5C2E0D;
  --text: #1A1A1A;
  --text-sub: #6B6560;
  --text-hint: #9D9894;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E8E4DF;
  --border-strong: #CEC9C3;
  --danger: #C0392B;
  --danger-hover: #A93226;
  --success-bg: #EDF7EE;
  --success-text: #2E7D32;
  --radius: 12px;
  --radius-sm: 8px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Top Nav ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
}
.nav-logo {
  font-size: 20px;
  font-weight: 600;
  color: var(--brand);
  letter-spacing: -0.3px;
}
.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-sub);
}
.nav-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--brand-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--brand-dark);
}

/* ── Page ── */
.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

.account-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.card-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-hint);
  padding: 14px 16px 8px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  font-size: 14px;
}
.info-val { color: var(--text-sub); }
.info-val.accent { color: var(--brand); font-weight: 500; }

.action-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.card-section-label-inline {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-hint);
  margin-bottom: 10px;
}

/* Debug toggle (dev only) */
.debug-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.debug-label { font-size: 11px; color: var(--text-hint); }
.debug-btn {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 99px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.12s;
}
.debug-btn.active {
  background: var(--brand-light);
  border-color: var(--brand);
  color: var(--brand-dark);
  font-weight: 500;
}

/* ── Cancel button ── */
.btn-cancel-outline {
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1px solid var(--brand);
  border-radius: var(--radius-sm);
  color: var(--brand);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-cancel-outline:hover { background: var(--brand-light); }

/* ── Modal overlay ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.48);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.overlay.open { display: flex; }

.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 0 20px 40px;
  animation: slideUp 0.28s cubic-bezier(0.34,1.1,0.64,1);
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.sheet-handle {
  width: 40px;
  height: 4px;
  border-radius: 99px;
  background: var(--border-strong);
  margin: 10px auto 18px;
}

.sheet-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}
.sheet-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.sheet-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-sub);
  flex-shrink: 0;
  margin-left: 8px;
  margin-top: 1px;
  font-family: inherit;
  transition: background 0.12s;
}
.sheet-close:hover { background: var(--border); }
.sheet-sub {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.6;
  margin-bottom: 18px;
}

/* Progress */
.progress-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 22px;
}
.progress-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 99px;
  transition: width 0.35s ease;
}

/* ── Survey badge ── */
.survey-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 99px;
  margin-bottom: 16px;
}
.badge-first { background: var(--brand-light); color: var(--brand-dark); }
.badge-repeat { background: #EDF7F5; color: #0E6B56; }

/* ── Questions ── */
.q-block { margin-bottom: 20px; }
.q-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.45;
}
.q-sub {
  font-size: 11px;
  color: var(--text-hint);
  margin-bottom: 8px;
  margin-top: -6px;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  transition: border-color 0.1s, background 0.1s;
  user-select: none;
}
.opt:hover { border-color: var(--brand-mid); background: var(--brand-light); }
.opt.selected {
  border-color: var(--brand);
  background: var(--brand-light);
  color: var(--brand-dark);
}
.opt input[type=radio],
.opt input[type=checkbox] {
  width: 15px;
  height: 15px;
  accent-color: var(--brand);
  flex-shrink: 0;
  cursor: pointer;
}

/* ── Chip selector (ranked) ── */
.chips-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 99px;
  font-size: 12.5px;
  color: var(--text-sub);
  cursor: pointer;
  user-select: none;
  transition: border-color 0.12s, background 0.12s, color 0.12s;
  line-height: 1.3;
}
.chip:hover {
  border-color: var(--brand-mid);
  background: var(--brand-light);
  color: var(--brand-dark);
}
.chip.rank-1 {
  border-color: var(--brand);
  background: var(--brand-light);
  color: var(--brand-dark);
  font-weight: 500;
  padding-left: 10px;
}
.chip.rank-2, .chip.rank-3 {
  border-color: var(--brand-mid);
  background: var(--brand-light);
  color: var(--brand-dark);
  opacity: 0.85;
  padding-left: 10px;
}
.chip.disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.chip.disabled:hover {
  border-color: var(--border);
  background: transparent;
  color: var(--text-sub);
}
.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--brand);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}
.rank-badge.rank-2-badge { background: var(--brand-mid); }
.rank-badge.rank-3-badge { background: var(--brand-mid); opacity: 0.8; }
.chips-hint {
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 8px;
  line-height: 1.5;
}
.rank-legend {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.rank-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-sub);
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 18px 0;
}

/* ── Action buttons ── */
.btn-confirm {
  width: 100%;
  padding: 14px;
  background: var(--danger);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  opacity: 0.35;
  pointer-events: none;
  transition: opacity 0.2s, background 0.15s;
  margin-bottom: 10px;
}
.btn-confirm.enabled {
  opacity: 1;
  pointer-events: auto;
}
.btn-confirm.enabled:hover { background: var(--danger-hover); }

.btn-stay {
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text-sub);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
}
.btn-stay:hover { background: var(--bg); border-color: var(--brand); color: var(--brand); }

.progress-label {
  font-size: 12px;
  color: var(--text-hint);
  text-align: center;
  margin-top: 10px;
}

/* ── Complete state ── */
.complete-wrap {
  text-align: center;
  padding: 28px 0 12px;
  display: none;
}
.complete-wrap.show { display: block; }
.complete-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--success-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  font-size: 24px;
}
.complete-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.complete-sub {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.65;
  margin-bottom: 20px;
}
.btn-close-complete {
  padding: 12px 32px;
  background: var(--brand);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-close-complete:hover { background: var(--brand-hover); }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Tsuklio</span>
  <div class="nav-user">
    <div class="nav-avatar">JS</div>
    <span>Jujin Sato</span>
  </div>
</nav>

<div class="page">

  <!-- Dev toggle: simulate first vs repeat cancel -->
  <div class="debug-toggle">
    <span class="debug-label">🛠 Dev mode – キャンセルタイプ:</span>
    <button class="debug-btn active" id="btn-mode-first" onclick="setMode('first')">初回キャンセル</button>
    <button class="debug-btn" id="btn-mode-repeat" onclick="setMode('repeat')">2回目以降</button>
  </div>

  <div class="account-card">
    <div class="card-section-label">Subscription</div>
    <div class="info-row"><span>Plan</span><span class="info-val accent">Weekly</span></div>
    <div class="info-row"><span>Weekly Charge</span><span class="info-val">SGD 211.00</span></div>
    <div class="info-row"><span>Delivery Fee</span><span class="info-val">Free</span></div>
    <div class="info-row"><span>Next Delivery</span><span class="info-val">Sun, 22 Mar</span></div>
  </div>

  <div class="action-card">
    <div class="card-section-label-inline">Account Actions</div>
    <button class="btn-cancel-outline" onclick="openModal()">Cancel Subscription</button>
  </div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>

    <!-- Survey form -->
    <div id="survey-wrap">
      <div class="sheet-head">
        <div>
          <div class="sheet-title" id="sheet-title">Before you go...</div>
        </div>
        <button class="sheet-close" onclick="closeModal()">✕</button>
      </div>
      <p class="sheet-sub" id="sheet-sub"></p>

      <div class="progress-wrap">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div id="questions-wrap"></div>

      <div class="divider"></div>

      <button class="btn-confirm" id="btn-confirm" onclick="doCancel()">Yes, Cancel Subscription</button>
      <button class="btn-stay" onclick="closeModal()">No, Keep My Subscription</button>
      <p class="progress-label" id="progress-label"></p>
    </div>

    <!-- Complete state -->
    <div class="complete-wrap" id="complete-wrap">
      <div class="complete-icon">✓</div>
      <p class="complete-title">Subscription cancelled</p>
      <p class="complete-sub">
        ご回答ありがとうございました。<br>
        Tsukliojにいつでも再サインインして再開できます。<br>
        またのご利用をお待ちしています。
      </p>
      <button class="btn-close-complete" onclick="closeModal()">Close</button>
    </div>

  </div>
</div>

<script>
const REASONS_MAIN = [
  '価格が高い',
  'お客様ご自身の味の嗜好に合わない',
  'ご家族の味の嗜好に合わない',
  'メニューに飽きた',
  '受け取りたい曜日・時間帯で受け取れない',
  '1食あたりの量が足りない',
  '1食あたりの量が多い',
  'メニューをカスタムできない',
  'メニュー情報が少ない',
  '世帯人数に対してプランが合っていない',
  'より良いサービスを見つけた',
  'ライフスタイルが変化した',
  '一度試してみたかった',
  'その他'
];

const HOUSEHOLDS = [
  '共働き世帯（お子さまあり）',
  '共働き世帯（お子さまなし）',
  '片働き世帯（お子さまあり）',
  '片働き世帯（お子さまなし）',
  '単身世帯',
  '3世帯同居',
  'その他'
];

const INTENTS = [
  '現在のプラン・サービス内容でも、しばらく時間が経てば再開したい',
  'プランやサービス内容が改善されれば再開したい',
  '再開するつもりはない'
];

const REOPEN_REASONS = [
  '価格・プランが改善された',
  'メニューの種類・品質が改善された',
  'ライフスタイルが変わった（引越し・育児など）',
  'クーポンや特典があった',
  '家族や友人に勧められた',
  '他サービスをやめた',
  'その他'
];

let mode = 'first';
let ans = {};

function setMode(m) {
  mode = m;
  ans = {};
  document.getElementById('btn-mode-first').classList.toggle('active', m === 'first');
  document.getElementById('btn-mode-repeat').classList.toggle('active', m === 'repeat');
}

function openModal() {
  ans = {};
  document.getElementById('survey-wrap').style.display = '';
  document.getElementById('complete-wrap').classList.remove('show');
  renderSheet();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').scrollTop = 0;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  ans = {};
}

function renderSheet() {
  if (mode === 'first') {
    document.getElementById('sheet-title').textContent = 'Before you go…';
    document.getElementById('sheet-sub').textContent =
      'Please answer all questions below. Your feedback helps us improve Tsuklio.\nThe cancel button will become available once you have completed the survey.';
    renderFirstSurvey();
  } else {
    document.getElementById('sheet-title').textContent = 'One quick question';
    document.getElementById('sheet-sub').textContent =
      'Please answer the questions below before confirming. It only takes 30 seconds.';
    renderRepeatSurvey();
  }
  updateProgress();
}

function renderFirstSurvey() {
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';

  // Q1 - 世帯構成
  wrap.appendChild(buildRadio('q1', 'Q1. 現在の居住環境を教えてください', null, HOUSEHOLDS, 'household', v => {
    ans.household = v;
    updateProgress();
  }, ans.household));

  // Q2+Q3 combined - ranked reason chips
  if (!ans.ranked_reasons) ans.ranked_reasons = [];
  wrap.appendChild(buildRankedChips('q2', 'Q2. 解約理由を選んでください（最大3つ・タップした順が優先度順になります）',
    REASONS_MAIN, vals => {
      ans.ranked_reasons = vals;
      ans.main_reason = vals[0] || null;
      ans.top3 = vals.slice(1);
      updateProgress();
    }, ans.ranked_reasons));

  // Q3 - 再開意向
  wrap.appendChild(buildRadio('q3', 'Q3. 今後、再開意向はありますか？', null, INTENTS, 'intent', v => {
    ans.intent = v;
    updateProgress();
  }, ans.intent));
}



function renderRepeatSurvey() {
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';

  // Q1 - 解約最大理由 (same as first)
  wrap.appendChild(buildRadio('q1', 'Q1. 解約する最大の理由を教えてください', null, REASONS_MAIN, 'main_reason', v => {
    ans.main_reason = v;
    updateProgress();
  }, ans.main_reason));

  // Q2 - 再開した理由 (repeat only)
  wrap.appendChild(buildRadio('q2', 'Q2. 前回、再開された理由を教えてください', null, REOPEN_REASONS, 'reopen_reason', v => {
    ans.reopen_reason = v;
    updateProgress();
  }, ans.reopen_reason));
}

function buildRadio(id, label, subLabel, options, key, onChange, current) {
  const block = document.createElement('div');
  block.className = 'q-block';
  block.id = id + '-block';

  const lbl = document.createElement('p');
  lbl.className = 'q-label';
  lbl.textContent = label;
  block.appendChild(lbl);

  if (subLabel) {
    const sub = document.createElement('p');
    sub.className = 'q-sub';
    sub.textContent = subLabel;
    block.appendChild(sub);
  }

  const list = document.createElement('div');
  list.className = 'options-list';

  options.forEach(opt => {
    const item = document.createElement('label');
    item.className = 'opt' + (current === opt ? ' selected' : '');

    const input = document.createElement('input');
    input.type = 'radio';
    input.name = key;
    input.value = opt;
    input.checked = current === opt;

    input.addEventListener('change', () => {
      list.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
      item.classList.add('selected');
      onChange(opt);
    });

    item.appendChild(input);
    item.appendChild(document.createTextNode(opt));
    list.appendChild(item);
  });

  block.appendChild(list);
  return block;
}

function buildRankedChips(id, label, options, onChange, currentVals) {
  const MAX = 3;
  const block = document.createElement('div');
  block.className = 'q-block';
  block.id = id + '-block';

  const lbl = document.createElement('p');
  lbl.className = 'q-label';
  lbl.textContent = label;
  block.appendChild(lbl);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'rank-legend';
  legend.innerHTML =
    '<div class="rank-legend-item"><span class="rank-badge" style="background:var(--brand)">1</span><span>最大の理由</span></div>' +
    '<div class="rank-legend-item"><span class="rank-badge rank-2-badge">2</span><span>2番目</span></div>' +
    '<div class="rank-legend-item"><span class="rank-badge rank-3-badge">3</span><span>3番目（任意）</span></div>';
  block.appendChild(legend);

  const wrap = document.createElement('div');
  wrap.className = 'chips-wrap';

  const hint = document.createElement('p');
  hint.className = 'chips-hint';

  function refresh() {
    const sel = currentVals.length;
    hint.textContent = sel === 0
      ? '最大の理由から順にタップしてください'
      : sel === MAX
      ? 'タップして選択を解除できます'
      : 'あと' + (MAX - sel) + 'つ追加できます（任意）';

    Array.from(wrap.children).forEach(chip => {
      const v = chip.dataset.val;
      const rank = currentVals.indexOf(v);
      chip.className = 'chip';
      // remove old badge
      const existing = chip.querySelector('.rank-badge');
      if (existing) existing.remove();

      if (rank === -1) {
        if (sel >= MAX) chip.classList.add('disabled');
      } else {
        chip.classList.add('rank-' + (rank + 1));
        const badge = document.createElement('span');
        badge.className = 'rank-badge' + (rank > 0 ? ' rank-' + (rank+1) + '-badge' : '');
        badge.textContent = rank + 1;
        chip.insertBefore(badge, chip.firstChild);
      }
    });
  }

  options.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.val = opt;
    chip.textContent = opt;
    chip.addEventListener('click', () => {
      if (chip.classList.contains('disabled')) return;
      const idx = currentVals.indexOf(opt);
      if (idx === -1) {
        if (currentVals.length < MAX) currentVals.push(opt);
      } else {
        currentVals.splice(idx, 1);
      }
      refresh();
      onChange([...currentVals]);
    });
    wrap.appendChild(chip);
  });

  refresh();
  block.appendChild(wrap);
  block.appendChild(hint);
  return block;
}

function updateProgress() {
  let total, done;

  if (mode === 'first') {
    total = 3;
    const q1 = ans.household ? 1 : 0;
    const q2 = (ans.ranked_reasons && ans.ranked_reasons.length > 0) ? 1 : 0;
    const q3 = ans.intent ? 1 : 0;
    done = q1 + q2 + q3;
  } else {
    total = 2;
    done = (ans.main_reason ? 1 : 0) + (ans.reopen_reason ? 1 : 0);
  }

  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  const isComplete = done === total;
  const btn = document.getElementById('btn-confirm');
  btn.classList.toggle('enabled', isComplete);

  const remaining = total - done;
  document.getElementById('progress-label').textContent = isComplete
    ? 'All done — tap the button above to confirm cancellation.'
    : `${remaining} question${remaining > 1 ? 's' : ''} remaining`;
}

function doCancel() {
  document.getElementById('survey-wrap').style.display = 'none';
  document.getElementById('complete-wrap').classList.add('show');
  document.getElementById('sheet').scrollTop = 0;
}

// Close on overlay click
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
