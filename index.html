<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tsuklio – Cancel Subscription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand: #B85C1A;
  --brand-hover: #9A4C14;
  --brand-light: #FDF3EB;
  --brand-mid: #E8873A;
  --brand-dark: #5C2E0D;
  --text: #1A1A1A;
  --text-sub: #6B6560;
  --text-hint: #9D9894;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E8E4DF;
  --border-strong: #CEC9C3;
  --danger: #C0392B;
  --danger-hover: #A93226;
  --radius: 12px;
  --radius-sm: 8px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px;
}
.nav-logo { font-size: 20px; font-weight: 600; color: var(--brand); letter-spacing: -0.3px; }
.nav-user { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-sub); }
.nav-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--brand-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--brand-dark);
}

.page { max-width: 480px; margin: 0 auto; padding: 24px 16px 80px; }

.debug-toggle { display: flex; gap: 6px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.debug-label { font-size: 11px; color: var(--text-hint); }
.debug-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 99px;
  border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--text-sub); cursor: pointer;
  transition: all 0.12s;
}
.debug-btn.active { background: var(--brand-light); border-color: var(--brand); color: var(--brand-dark); font-weight: 500; }

.account-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
}
.card-section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text-hint); padding: 14px 16px 8px;
}
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; border-top: 1px solid var(--border); font-size: 14px;
}
.info-val { color: var(--text-sub); }
.info-val.accent { color: var(--brand); font-weight: 500; }

.action-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.card-section-label-inline { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-hint); margin-bottom: 10px; }

.btn-cancel-outline {
  width: 100%; padding: 13px;
  background: transparent; border: 1px solid var(--brand);
  border-radius: var(--radius-sm); color: var(--brand);
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.btn-cancel-outline:hover { background: var(--brand-light); }

/* ── Modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.48); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }

.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 480px; max-height: 92vh;
  overflow-y: auto; padding: 0 20px 48px;
  animation: slideUp 0.28s cubic-bezier(0.34,1.1,0.64,1);
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.sheet-handle {
  width: 40px; height: 4px; border-radius: 99px;
  background: var(--border-strong); margin: 10px auto 18px;
}

/* ── Step UI ── */
.step-header { margin-bottom: 20px; }
.step-counter {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-hint); margin-bottom: 6px;
}
.step-title { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.35; }
.step-sub { font-size: 13px; color: var(--text-sub); margin-top: 5px; line-height: 1.55; }

/* Progress dots */
.progress-dots { display: flex; gap: 6px; margin-bottom: 22px; }
.dot {
  height: 4px; border-radius: 99px;
  background: var(--border); flex: 1;
  transition: background 0.3s;
}
.dot.done { background: var(--brand); }
.dot.active { background: var(--brand-mid); }

/* Radio options */
.options-list { display: flex; flex-direction: column; gap: 5px; }
.opt {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px; border: 1px solid var(--border);
  border-radius: 9px; cursor: pointer; font-size: 13px; color: var(--text);
  line-height: 1.4; transition: border-color 0.1s, background 0.1s; user-select: none;
}
.opt:hover { border-color: var(--brand-mid); background: var(--brand-light); }
.opt.selected { border-color: var(--brand); background: var(--brand-light); color: var(--brand-dark); }
.opt input[type=radio] { width: 15px; height: 15px; accent-color: var(--brand); flex-shrink: 0; cursor: pointer; }

/* Ranked chips */
.chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  position: relative; display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 99px;
  font-size: 12.5px; color: var(--text-sub); cursor: pointer; user-select: none;
  transition: border-color 0.12s, background 0.12s, color 0.12s; line-height: 1.3;
}
.chip:hover { border-color: var(--brand-mid); background: var(--brand-light); color: var(--brand-dark); }
.chip.rank-1 { border-color: var(--brand); background: var(--brand-light); color: var(--brand-dark); font-weight: 500; }
.chip.rank-2, .chip.rank-3 { border-color: var(--brand-mid); background: var(--brand-light); color: var(--brand-dark); opacity: 0.88; }
.chip.disabled { opacity: 0.3; cursor: not-allowed; }
.chip.disabled:hover { border-color: var(--border); background: transparent; color: var(--text-sub); }
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 17px; height: 17px; border-radius: 50%;
  background: var(--brand); color: #fff;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.rank-badge.b2 { background: var(--brand-mid); }
.rank-badge.b3 { background: var(--brand-mid); opacity: 0.75; }
.chips-hint { font-size: 12px; color: var(--text-hint); margin-top: 8px; line-height: 1.5; }

/* ── Free text for "その他" ── */
.other-input-wrap {
  margin-top: 10px;
  animation: fadeIn 0.18s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.other-input {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--brand);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  outline: none;
  resize: vertical;
  min-height: 72px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
.other-input:focus { border-color: var(--brand-dark); }
.other-input::placeholder { color: var(--text-hint); }

.rank-legend {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 12px; padding: 8px 12px;
  background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border);
}
.rank-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-sub); }

/* Nav buttons */
.step-nav { display: flex; gap: 10px; margin-top: 20px; }
.btn-next {
  flex: 1; padding: 13px; background: var(--brand); border: none;
  border-radius: var(--radius-sm); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; opacity: 0.35; pointer-events: none;
  transition: opacity 0.2s, background 0.15s;
}
.btn-next.enabled { opacity: 1; pointer-events: auto; }
.btn-next.enabled:hover { background: var(--brand-hover); }
.btn-back {
  padding: 13px 18px; background: transparent; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); color: var(--text-sub); font-size: 14px;
  cursor: pointer; font-family: inherit; transition: background 0.12s;
}
.btn-back:hover { background: var(--bg); }

/* Confirm step */
.confirm-summary {
  background: var(--bg); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 16px;
}
.confirm-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; }
.confirm-label { color: var(--text-hint); }
.confirm-val { color: var(--text); font-weight: 500; max-width: 60%; text-align: right; line-height: 1.4; }

.btn-confirm-cancel {
  width: 100%; padding: 14px; background: var(--danger); border: none;
  border-radius: var(--radius-sm); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-bottom: 10px;
  transition: background 0.15s;
}
.btn-confirm-cancel:hover { background: var(--danger-hover); }
.btn-stay {
  width: 100%; padding: 13px; background: transparent;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  color: var(--text-sub); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: background 0.12s, border-color 0.12s;
}
.btn-stay:hover { background: var(--bg); border-color: var(--brand); color: var(--brand); }

/* Complete */
.complete-wrap { text-align: center; padding: 28px 0 12px; display: none; }
.complete-wrap.show { display: block; }
.complete-icon {
  width: 52px; height: 52px; border-radius: 50%;
  background: #EDF7EE; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px; font-size: 24px; color: #2E7D32;
}
.complete-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.complete-sub { font-size: 13px; color: var(--text-sub); line-height: 1.65; margin-bottom: 20px; }

.btn-detail-survey {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 13px;
  background: var(--brand-light); border: 1.5px solid var(--brand);
  border-radius: var(--radius-sm); color: var(--brand-dark);
  font-size: 13px; font-weight: 500; text-decoration: none;
  margin-bottom: 8px; transition: background 0.15s; font-family: inherit;
}
.btn-detail-survey:hover { background: #f5e0cc; }
.btn-detail-note { font-size: 11px; color: var(--text-hint); text-align: center; margin-bottom: 16px; }
.btn-close-complete {
  padding: 12px 32px; background: var(--brand); border: none;
  border-radius: var(--radius-sm); color: #fff;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.btn-close-complete:hover { background: var(--brand-hover); }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Tsuklio</span>
  <div class="nav-user">
    <div class="nav-avatar">JS</div>
    <span>Jujin Sato</span>
  </div>
</nav>

<div class="page">
  <div class="debug-toggle">
    <span class="debug-label">🛠 Dev – キャンセルタイプ:</span>
    <button class="debug-btn active" id="btn-mode-first" onclick="setMode('first')">初回</button>
    <button class="debug-btn" id="btn-mode-repeat" onclick="setMode('repeat')">2回目以降</button>
  </div>

  <div class="account-card">
    <div class="card-section-label">Subscription</div>
    <div class="info-row"><span>Plan</span><span class="info-val accent">Weekly</span></div>
    <div class="info-row"><span>Weekly Charge</span><span class="info-val">SGD 211.00</span></div>
    <div class="info-row"><span>Delivery Fee</span><span class="info-val">Free</span></div>
    <div class="info-row"><span>Next Delivery</span><span class="info-val">Sun, 22 Mar</span></div>
  </div>

  <div class="action-card">
    <div class="card-section-label-inline">Account Actions</div>
    <button class="btn-cancel-outline" onclick="openModal()">Cancel Subscription</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>

    <!-- Step view -->
    <div id="step-view">
      <div class="progress-dots" id="progress-dots"></div>
      <div class="step-header">
        <div class="step-counter" id="step-counter"></div>
        <div class="step-title" id="step-title"></div>
        <div class="step-sub" id="step-sub"></div>
      </div>
      <div id="step-body"></div>
      <div class="step-nav" id="step-nav"></div>
    </div>

    <!-- Complete -->
    <div class="complete-wrap" id="complete-wrap">
      <div class="complete-icon">✓</div>
      <p class="complete-title">Subscription cancelled</p>
      <p class="complete-sub">ご回答ありがとうございました。<br>Tsukliojにいつでも再サインインして再開できます。</p>
      <a class="btn-detail-survey" href="https://forms.example.com/tsuklio-exit-survey" target="_blank">
        より詳しいアンケートに回答する（所要時間 約5分）<span>→</span>
      </a>
      <p class="btn-detail-note">謝礼として10 SGDをご用意しています</p>
      <button class="btn-close-complete" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const REASONS = [
  '価格が高い',
  'お客様ご自身の味の嗜好に合わない',
  'ご家族の味の嗜好に合わない',
  'メニューに飽きた',
  '受け取りたい曜日・時間帯で受け取れない',
  '1食あたりの量が足りない',
  '1食あたりの量が多い',
  'メニューをカスタムできない',
  'メニュー情報が少ない',
  '世帯人数に対してプランが合っていない',
  'より良いサービスを見つけた',
  'ライフスタイルが変化した',
  '一度試してみたかった',
  'その他'
];
const HOUSEHOLDS = [
  '共働き世帯（お子さまあり）',
  '共働き世帯（お子さまなし）',
  '片働き世帯（お子さまあり）',
  '片働き世帯（お子さまなし）',
  '単身世帯',
  '3世帯同居',
  'その他'
];
const INTENTS = [
  '現在のプラン・サービス内容でも、しばらく時間が経てば再開したい',
  'プランやサービス内容が改善されれば再開したい',
  '再開するつもりはない'
];

// ── State ──
let mode = 'first';
let currentStep = 0;
let ans = {};

// ── Step definitions ──
function getSteps() {
  if (mode === 'first') {
    return [
      {
        key: 'household',
        title: '現在の居住環境を教えてください',
        sub: 'よりよいサービス改善のため、差し支えなければお答えください。',
        type: 'radio',
        options: HOUSEHOLDS,
      },
      {
        key: 'ranked_reasons',
        title: '解約理由を教えてください',
        sub: '最大の理由から順にタップしてください（最大3つ）',
        type: 'ranked',
        options: REASONS,
      },
      {
        key: 'intent',
        title: '今後の再開意向はありますか？',
        sub: null,
        type: 'radio',
        options: INTENTS,
      },
      {
        key: '__confirm__',
        title: '解約を確定しますか？',
        sub: 'ご回答内容を確認してください。',
        type: 'confirm',
      }
    ];
  } else {
    return [
      {
        key: 'ranked_reasons',
        title: '解約理由を教えてください',
        sub: '最大の理由から順にタップしてください（最大3つ）',
        type: 'ranked',
        options: REASONS,
      },
      {
        key: 'intent',
        title: '今後の再開意向はありますか？',
        sub: null,
        type: 'radio',
        options: INTENTS,
      },
      {
        key: '__confirm__',
        title: '解約を確定しますか？',
        sub: 'ご回答内容を確認してください。',
        type: 'confirm',
      }
    ];
  }
}

function setMode(m) {
  mode = m;
  ans = {};
  currentStep = 0;
  document.getElementById('btn-mode-first').classList.toggle('active', m === 'first');
  document.getElementById('btn-mode-repeat').classList.toggle('active', m === 'repeat');
}

function openModal() {
  ans = {};
  currentStep = 0;
  document.getElementById('complete-wrap').classList.remove('show');
  document.getElementById('step-view').style.display = '';
  renderStep();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').scrollTop = 0;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// ── Render current step ──
function renderStep() {
  const steps = getSteps();
  const step = steps[currentStep];
  const total = steps.length;

  // Progress dots
  const dotsEl = document.getElementById('progress-dots');
  dotsEl.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    dotsEl.appendChild(d);
  });

  // Header
  const surveyStepNum = steps.filter(s => s.key !== '__confirm__').length;
  const isConfirm = step.key === '__confirm__';
  document.getElementById('step-counter').textContent =
    isConfirm ? '' : `Step ${currentStep + 1} / ${surveyStepNum}`;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-sub').textContent = step.sub || '';

  // Body
  const body = document.getElementById('step-body');
  body.innerHTML = '';

  if (step.type === 'radio') {
    body.appendChild(buildRadio(step.key, step.options));
  } else if (step.type === 'ranked') {
    body.appendChild(buildRankedChips(step.key, step.options));
  } else if (step.type === 'confirm') {
    body.appendChild(buildConfirm());
  }

  // Nav
  renderNav(step);

  document.getElementById('sheet').scrollTop = 0;
}

function renderNav(step) {
  const nav = document.getElementById('step-nav');
  nav.innerHTML = '';

  const isFirst = currentStep === 0;
  const isConfirm = step.key === '__confirm__';

  // Back button (not on first step)
  if (!isFirst) {
    const back = document.createElement('button');
    back.className = 'btn-back';
    back.textContent = '← 戻る';
    back.onclick = () => { currentStep--; renderStep(); };
    nav.appendChild(back);
  }

  if (isConfirm) {
    // Confirm step: two separate buttons stacked
    nav.style.flexDirection = 'column';
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn-confirm-cancel';
    confirmBtn.textContent = 'Yes, Cancel Subscription';
    confirmBtn.onclick = doCancel;
    nav.appendChild(confirmBtn);

    const stayBtn = document.createElement('button');
    stayBtn.className = 'btn-stay';
    stayBtn.textContent = 'No, Keep My Subscription';
    stayBtn.onclick = closeModal;
    nav.appendChild(stayBtn);
  } else {
    nav.style.flexDirection = '';
    const next = document.createElement('button');
    next.id = 'btn-next';
    next.className = 'btn-next' + (isStepAnswered(step) ? ' enabled' : '');
    next.textContent = 'Next →';
    next.onclick = () => { currentStep++; renderStep(); };
    nav.appendChild(next);
  }
}

function isStepAnswered(step) {
  if (step.key === 'ranked_reasons') {
    return ans.ranked_reasons && ans.ranked_reasons.length > 0;
  }
  return !!ans[step.key];
}

// ── Radio builder ──
function buildRadio(key, options) {
  const container = document.createElement('div');

  const wrap = document.createElement('div');
  wrap.className = 'options-list';

  // その他テキスト欄
  const otherWrap = document.createElement('div');
  otherWrap.className = 'other-input-wrap';
  otherWrap.style.display = 'none';
  const otherInput = document.createElement('textarea');
  otherInput.className = 'other-input';
  otherInput.placeholder = '具体的に教えてください...';
  otherInput.value = ans[key + '_other'] || '';
  otherInput.addEventListener('input', () => {
    ans[key + '_other'] = otherInput.value.trim();
    updateNextBtn(key);
  });
  otherWrap.appendChild(otherInput);

  function updateNextBtn(k) {
    const nb = document.getElementById('btn-next');
    if (!nb) return;
    const val = ans[k];
    if (val === 'その他') {
      nb.classList.toggle('enabled', !!(ans[k + '_other'] && ans[k + '_other'].length > 0));
    } else {
      nb.classList.toggle('enabled', !!val);
    }
  }

  options.forEach(opt => {
    const item = document.createElement('label');
    item.className = 'opt' + (ans[key] === opt ? ' selected' : '');
    const input = document.createElement('input');
    input.type = 'radio';
    input.name = key;
    input.value = opt;
    input.checked = ans[key] === opt;
    input.addEventListener('change', () => {
      ans[key] = opt;
      wrap.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
      item.classList.add('selected');
      otherWrap.style.display = opt === 'その他' ? '' : 'none';
      if (opt === 'その他') { otherInput.focus(); }
      updateNextBtn(key);
    });
    item.appendChild(input);
    item.appendChild(document.createTextNode(opt));
    wrap.appendChild(item);
  });

  // 初期表示: 既にその他が選ばれていたら欄を出す
  if (ans[key] === 'その他') otherWrap.style.display = '';

  container.appendChild(wrap);
  container.appendChild(otherWrap);
  return container;
}

// ── Ranked chips builder ──
function buildRankedChips(key, options) {
  if (!ans[key]) ans[key] = [];
  const currentVals = ans[key];
  const MAX = 3;

  const container = document.createElement('div');

  const legend = document.createElement('div');
  legend.className = 'rank-legend';
  legend.innerHTML =
    '<div class="rank-legend-item"><span class="rank-badge">1</span><span>最大の理由</span></div>' +
    '<div class="rank-legend-item"><span class="rank-badge b2">2</span><span>2番目</span></div>' +
    '<div class="rank-legend-item"><span class="rank-badge b3">3</span><span>3番目（任意）</span></div>';
  container.appendChild(legend);

  const wrap = document.createElement('div');
  wrap.className = 'chips-wrap';

  const hint = document.createElement('p');
  hint.className = 'chips-hint';

  function refresh() {
    const sel = currentVals.length;
    hint.textContent = sel === 0
      ? '最大の理由から順にタップしてください'
      : sel >= MAX ? 'タップして選択を解除できます' : 'あと' + (MAX - sel) + 'つ追加できます（任意）';

    wrap.querySelectorAll('.chip').forEach(chip => {
      const v = chip.dataset.val;
      const rank = currentVals.indexOf(v);
      // reset
      chip.className = 'chip';
      const old = chip.querySelector('.rank-badge');
      if (old) old.remove();

      if (rank === -1) {
        if (sel >= MAX) chip.classList.add('disabled');
      } else {
        chip.classList.add('rank-' + (rank + 1));
        const badge = document.createElement('span');
        badge.className = 'rank-badge' + (rank === 1 ? ' b2' : rank === 2 ? ' b3' : '');
        badge.textContent = rank + 1;
        chip.insertBefore(badge, chip.firstChild);
      }
    });

    const nb = document.getElementById('btn-next');
    if (nb) nb.classList.toggle('enabled', currentVals.length > 0);
  }

  options.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.val = opt;
    chip.textContent = opt;
    chip.addEventListener('click', () => {
      if (chip.classList.contains('disabled')) return;
      const idx = currentVals.indexOf(opt);
      if (idx === -1) { if (currentVals.length < MAX) currentVals.push(opt); }
      else { currentVals.splice(idx, 1); }
      ans[key] = [...currentVals];
      // refreshWithOtherが定義されていれば使う（後から定義されるため）
      if (typeof wrap._refresh === 'function') wrap._refresh();
      else refresh();
    });
    wrap.appendChild(chip);
  });

  // その他テキスト欄
  const otherWrap = document.createElement('div');
  otherWrap.className = 'other-input-wrap';
  otherWrap.style.display = currentVals.includes('その他') ? '' : 'none';
  const otherInput = document.createElement('textarea');
  otherInput.className = 'other-input';
  otherInput.placeholder = '具体的に教えてください...';
  otherInput.value = ans[key + '_other'] || '';
  otherInput.addEventListener('input', () => {
    ans[key + '_other'] = otherInput.value.trim();
    const nb = document.getElementById('btn-next');
    if (nb) nb.classList.toggle('enabled', currentVals.length > 0 && !(currentVals.includes('その他') && !ans[key + '_other']));
  });
  otherWrap.appendChild(otherInput);

  // refresh後にその他欄の表示を同期
  const origRefresh = refresh;
  function refreshWithOther() {
    origRefresh();
    const show = currentVals.includes('その他');
    otherWrap.style.display = show ? '' : 'none';
    if (show) { otherInput.focus(); }
    // nextボタン: その他が含まれていてテキスト未入力はNG
    const nb = document.getElementById('btn-next');
    if (nb) {
      const hasOtherText = !currentVals.includes('その他') || (ans[key + '_other'] && ans[key + '_other'].length > 0);
      nb.classList.toggle('enabled', currentVals.length > 0 && hasOtherText);
    }
  }

  // チップのclickをrefreshWithOtherで再bindする必要があるのでwrapの処理を上書き
  wrap.querySelectorAll('.chip').forEach(chip => {
    const oldClick = chip.onclick;
    chip.addEventListener('click', () => { refreshWithOther(); }, true);
  });

  // wrapにrefresh関数を登録（chip clickから参照できるように）
  wrap._refresh = refreshWithOther;
  // 初回refresh
  refreshWithOther();
  container.appendChild(wrap);
  container.appendChild(hint);
  container.appendChild(otherWrap);
  return container;
}

// ── Confirm summary builder ──
function buildConfirm() {
  const wrap = document.createElement('div');
  const summary = document.createElement('div');
  summary.className = 'confirm-summary';

  function row(label, val) {
    if (!val) return;
    const r = document.createElement('div');
    r.className = 'confirm-row';
    r.innerHTML = `<span class="confirm-label">${label}</span><span class="confirm-val">${val}</span>`;
    summary.appendChild(r);
  }

  if (mode === 'first') {
    const hh = ans.household === 'その他' ? 'その他：' + (ans.household_other || '') : ans.household;
    row('居住環境', hh);
  }

  const ranked = ans.ranked_reasons || [];
  const otherText = ans.ranked_reasons_other ? '（' + ans.ranked_reasons_other + '）' : '';
  if (ranked[0]) row('最大の解約理由', ranked[0] === 'その他' ? 'その他' + otherText : ranked[0]);
  if (ranked[1]) row('2番目の理由', ranked[1] === 'その他' ? 'その他' + otherText : ranked[1]);
  if (ranked[2]) row('3番目の理由', ranked[2] === 'その他' ? 'その他' + otherText : ranked[2]);
  const intentVal = ans.intent === 'その他' ? 'その他：' + (ans.intent_other || '') : ans.intent;
  row('再開意向', intentVal);

  wrap.appendChild(summary);
  return wrap;
}

function doCancel() {
  document.getElementById('step-view').style.display = 'none';
  document.getElementById('complete-wrap').classList.add('show');
  document.getElementById('sheet').scrollTop = 0;
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
